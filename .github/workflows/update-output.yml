name: Update RSS Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create config.yaml
        shell: bash
        run: |
          cat > config.yaml <<'EOF'
          ${{ vars.MATCHA_CONFIG_YAML }}
          EOF


      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install Matcha
        run: go install github.com/piqoni/matcha@latest

      - name: Validate MATCHA_DB_KEY
        shell: bash
        env:
          MATCHA_DB_KEY: ${{ secrets.MATCHA_DB_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MATCHA_DB_KEY:-}" ]; then
            echo "ERROR: MATCHA_DB_KEY secret is not set!"
            echo "Please add MATCHA_DB_KEY to your repository secrets; DB encryption is mandatory."
            exit 1
          fi


      - name: Decrypt database
        shell: bash
        env:
          MATCHA_DB_KEY: ${{ secrets.MATCHA_DB_KEY }}
        run: |
          set -euo pipefail
      
          if [ -f matcha.db.enc ]; then
            openssl enc -aes-256-cbc -d -pbkdf2 -md sha256 \
              -in matcha.db.enc \
              -out matcha.db \
              -pass env:MATCHA_DB_KEY
          else
            echo "matcha.db.enc not found; skipping decrypt"
          fi

      - name: Run Matcha with Custom Config
        run: |
          set -euo pipefail
          pip install --quiet pyyaml

          # Reddit throttles this endpoint to roughly one request per ~45-50s
          # per runner IP (observed: request 1 and request 9 succeeded, 47s
          # apart, with everything in between 429ing) so a short delay isn't
          # enough - space reddit.com requests out to match, with a retry.
          python3 <<'PYEOF'
          import subprocess
          import time

          import yaml

          with open("config.yaml") as f:
              cfg = yaml.safe_load(f)

          feeds = cfg.get("feeds", [])
          base_cfg = {k: v for k, v in cfg.items() if k != "feeds"}

          REDDIT_DELAY = 50
          DEFAULT_DELAY = 1
          RETRY_WAIT = 60
          MAX_RETRIES = 1

          def fetch(feed):
              with open("feed-config.yaml", "w") as f:
                  yaml.safe_dump({**base_cfg, "feeds": [feed]}, f)
              result = subprocess.run(
                  ["matcha", "-c", "feed-config.yaml"],
                  capture_output=True, text=True,
              )
              print(result.stdout + result.stderr, end="", flush=True)
              return "429" in result.stderr

          for i, feed in enumerate(feeds):
              print(f"Fetching feed {i + 1}/{len(feeds)}: {feed}", flush=True)
              rate_limited = fetch(feed)

              retries = 0
              while rate_limited and retries < MAX_RETRIES:
                  retries += 1
                  print(f"  rate-limited, waiting {RETRY_WAIT}s before retry {retries}/{MAX_RETRIES}", flush=True)
                  time.sleep(RETRY_WAIT)
                  rate_limited = fetch(feed)

              if i < len(feeds) - 1:
                  delay = REDDIT_DELAY if "reddit.com" in feed else DEFAULT_DELAY
                  time.sleep(delay)
          PYEOF

          rm -f feed-config.yaml
          matcha -c config.yaml --generate-all

      - name: Build HTML content
        run: |
          go run build_content.go

      - name: Remove plaintext markdown
        run: rm -f pre-docs/*.md

      - name: Encrypt database
        shell: bash
        env:
          MATCHA_DB_KEY: ${{ secrets.MATCHA_DB_KEY }}
        run: |
          set -euo pipefail

          if [ ! -f matcha.db ]; then
            echo "matcha.db not found; nothing to encrypt (first run or Matcha didn't create DB)."
            exit 0
          fi

          openssl enc -aes-256-cbc -salt -pbkdf2 -md sha256 \
            -in matcha.db \
            -out matcha.db.enc \
            -pass env:MATCHA_DB_KEY

          rm -f matcha.db


      - name: Process Site (Encrypt or Copy)
        shell: bash
        env:
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
        run: |
          mkdir -p docs
          if [ -n "$STATICRYPT_PASSWORD" ]; then
            npm install -g staticrypt
            staticrypt pre-docs/index.html -p "$STATICRYPT_PASSWORD" -d docs --short
          else
            cp pre-docs/index.html docs/index.html
          fi

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Update RSS feeds and DB state"
          file_pattern: 'matcha.db.enc docs/*'
          branch: main
